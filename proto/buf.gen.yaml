# Go codegen targets. Run via `mage genProto` (`buf generate`), executed from this
# directory, so all paths below are relative to proto/. TypeScript is generated by
# a SEPARATE invocation (buf.gen.ts.yaml, with --include-imports) because the two
# languages need opposite handling of the protovalidate import — see magefile
# GenProto.
#
# Managed mode stamps the Go import path (go_package) onto every file so the
# .proto need not carry a go_package option. Go plugins run through the module's
# pinned `go tool` binaries (go.mod tool directives) for a hermetic, version-locked
# build.
version: v2
managed:
  enabled: true
  # Leave the protovalidate module on its own (BSR) go_package so our generated
  # code imports the SAME buf/validate Go package the protovalidate runtime uses.
  # Generating a second local copy would register buf/validate/validate.proto
  # twice and panic at init (protobuf global-registry conflict). This is also why
  # Go is generated WITHOUT --include-imports.
  disable:
    - module: buf.build/bufbuild/protovalidate
  override:
    - file_option: go_package_prefix
      value: github.com/tallam99/qlab/backend/internal/protogen
plugins:
  # Go message types.
  - local: ["go", "tool", "protoc-gen-go"]
    out: ../backend/internal/protogen
    opt: paths=source_relative
  # Go Connect-RPC server/client stubs.
  - local: ["go", "tool", "protoc-gen-connect-go"]
    out: ../backend/internal/protogen
    opt: paths=source_relative
