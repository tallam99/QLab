# Coverage report — `mage coverage`: runs all three tiers with statement coverage
# credited to the backend packages, merges them, and posts the per-package + total
# summary (excluding generated code) as a sticky PR comment.
#
# This lives in its own PR-only workflow rather than as a job in ci.yml on purpose:
# the comment is a pull-request affordance, not a merge gate, and it needs
# `pull-requests: write`. ci.yml is also called by deploy.yml (workflow_call on push
# to main), where a nested job may not request more permission than the caller grants
# — so a write-requesting job there fails workflow validation. Keeping coverage out of
# ci.yml avoids that and stops deploys from wastefully running the full coverage tiers.
#
# Informational only: it comments, it does not gate (the per-package floor is flagged
# in the table, not enforced), matching the soft stance of the mutation job.
name: Coverage

on:
  pull_request:

# One in-flight run per ref; a new push cancels the previous run.
concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # Mirrors `mage coverage`. Needs the same Postgres + Auth-emulator services as the
  # integration job, since it runs that tier.
  coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: qlab
          POSTGRES_PASSWORD: qlab
          POSTGRES_DB: qlab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qlab -d qlab"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Firebase emulator
        run: npm install -g firebase-tools@13.29.1
      - name: Start Firebase Auth emulator
        run: |
          firebase emulators:start --only auth --project demo-qlab --config firebase.json &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9099/emulator/v1/projects/demo-qlab/config >/dev/null; then
              echo "emulator ready"; exit 0
            fi
            sleep 2
          done
          echo "emulator did not become ready" >&2; exit 1
      - name: Install mage
        run: go install github.com/magefile/mage@v1.17.2
      - name: Measure coverage
        run: mage coverage
      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: coverage.md
