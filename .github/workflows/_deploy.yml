# Reusable deploy for ONE environment: API -> Cloud Run, then web -> Firebase
# Hosting. Called by deploy.yml (once for staging, once for production). Not run
# on its own (workflow_call only).
#
# All cloud identifiers come from **environment-scoped** GitHub Actions variables
# (Settings -> Environments -> staging/production -> Variables), so the same keys
# resolve to per-environment values. Auth is Workload Identity Federation — GitHub
# mints an OIDC token GCP trusts, so there is no long-lived service-account key.
# See docs/deploy.md for the one-time setup and the full list of required vars.
name: deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment: staging or production (also the QLAB_ENV value)."
        required: true
        type: string

permissions:
  contents: read
  id-token: write # required to mint the WIF OIDC token

jobs:
  api:
    name: API → Cloud Run (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }} # binds env-scoped vars + protection rules (prod approval)
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/api:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build & push image
        run: |
          docker build -f backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          # Cloud Run is invoked unauthenticated at the IAM layer: the app enforces
          # its own Firebase JWT on every endpoint (Phase 8). DATABASE_URL is read
          # from Secret Manager (never GitHub). The ^@^ prefix switches the
          # --set-env-vars delimiter to '@' so a comma-separated CORS list is safe.
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "${{ vars.CLOUD_RUN_RUNTIME_SA }}" \
            --set-env-vars "^@^QLAB_ENV=${{ inputs.environment }}@CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest"
          url="$(gcloud run services describe "${{ vars.CLOUD_RUN_SERVICE }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" --region "${{ vars.GCP_REGION }}" \
            --format='value(status.url)')"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed API: $url"

  web:
    name: Web → Firebase Hosting (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: api # the API's Cloud Run URL is injected into the page at build time
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - name: Build hello-world (inject API base URL)
        env:
          API_BASE_URL: ${{ needs.api.outputs.url }}
        run: frontend/build.sh

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        # firebase-tools authenticates via the WIF credentials exported by the auth
        # step (GOOGLE_APPLICATION_CREDENTIALS) — no Firebase token/SA key needed.
        run: firebase deploy --only hosting --project "${{ vars.FIREBASE_PROJECT_ID }}" --non-interactive
