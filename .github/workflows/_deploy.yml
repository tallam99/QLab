# Reusable deploy for ONE environment: API -> Cloud Run, then web -> Firebase
# Hosting, in a single job. Called by deploy.yml (once for staging, once for
# production). Not run on its own (workflow_call only).
#
# Why one job (not separate api/web jobs): a job declares `environment:` both to
# read that environment's variables AND to apply its protection rules. Two gated
# jobs => two approval prompts for production. The web step needs the API's Cloud
# Run URL anyway, so it already had to run after the API — folding both into one
# job costs no parallelism and makes prod a single approval.
#
# All cloud identifiers come from **environment-scoped** GitHub Actions variables
# (Settings -> Environments -> staging/production -> Variables). Auth is Workload
# Identity Federation — GitHub mints an OIDC token GCP trusts, so there is no
# long-lived service-account key. See docs/deploy.md for the one-time setup.
name: deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment: staging or production (also the QLAB_ENV value)."
        required: true
        type: string

permissions:
  contents: read
  id-token: write # required to mint the WIF OIDC token

jobs:
  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    # A single environment declaration -> env-scoped vars AND one protection-rule
    # prompt (production approval is requested once, not once per surface).
    environment: ${{ inputs.environment }}
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/api:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Node is needed for the Vite web build (below) and the Firebase CLI. Pinned
      # to the version the CI `frontend` job uses, with the npm cache keyed on the
      # frontend lockfile.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install mage
        run: go install github.com/magefile/mage@v1.17.2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build & push image
        run: |
          docker build -f backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Run database migrations
        # Apply migrations BEFORE the new revision deploys, so the schema the new
        # code expects is already in place. Uses the migrator (DDL-capable) role,
        # fetched from Secret Manager via WIF — never a laptop, never the runtime
        # app role. Migrations must be backward-compatible with the currently-live
        # revision (expand/contract) since old code briefly runs against the new
        # schema. A migration failure fails the deploy.
        run: |
          MIGRATE_DATABASE_URL="$(gcloud secrets versions access latest \
            --secret='${{ vars.DATABASE_MIGRATOR_SECRET }}' \
            --project='${{ vars.GCP_PROJECT_ID }}')"
          export MIGRATE_DATABASE_URL
          mage migrate

      - name: Deploy API to Cloud Run
        run: |
          # --allow-unauthenticated turns OFF Cloud Run's *platform* IAM check
          # (which would otherwise require every caller to present a Google IAM
          # identity via run.invoker). Browsers have no such identity, so this must
          # be off for the public PWA to reach the API at all. It does NOT make the
          # API open: the app verifies a Firebase JWT on every endpoint itself
          # (Phase 8). Two independent layers — platform invoker check (off) vs.
          # app-level JWT auth (on); the security is the latter.
          # The container env var DATABASE_URL is sourced from a Secret Manager
          # secret (never GitHub); its per-environment name is the DATABASE_SECRET
          # variable. The ^|^ prefix switches the --set-env-vars delimiter to '|'
          # so a comma-separated CORS list is safe. FIREBASE_PROJECT_ID is required
          # (the service verifies tokens against it) and reuses the same per-env var
          # the Firebase Hosting deploy uses.
          #
          # The operator surface (qlab.dev.v1, decision 0008) is staging-only: only
          # there do we attach OPERATOR_SECRET (the gate), OPERATOR_DATABASE_URL (the
          # operator's elevated, cross-tenant connection — it reuses the migrator/owner
          # secret, since the owner bypasses RLS and Neon can't make a BYPASSRLS role),
          # and FIREBASE_WEB_API_KEY (the Firebase browser key, for MintToken's token
          # exchange). Production gets none of them, so the surface can't exist there.
          SECRETS="DATABASE_URL=${{ vars.DATABASE_SECRET }}:latest"
          if [ "${{ inputs.environment }}" = "staging" ]; then
            SECRETS="$SECRETS,OPERATOR_SECRET=operator-secret:latest,OPERATOR_DATABASE_URL=${{ vars.DATABASE_MIGRATOR_SECRET }}:latest,FIREBASE_WEB_API_KEY=firebase-web-api-key:latest"
          fi
          # Container env vars. --set-env-vars REPLACES the whole set (it is not
          # additive), so every var goes in this one string; ^|^ makes '|' the
          # delimiter so comma-bearing values (the CORS list, a multi-email allowlist)
          # are safe. The delimiter must not appear in any value: '@' would collide
          # with the operator emails, so '|' (in neither URLs nor emails) is used.
          ENVVARS="QLAB_ENV=${{ inputs.environment }}|CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}|FIREBASE_PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }}"
          # Staging-only: the operator email allowlist that lets the in-app dev switcher
          # drive the operator surface via a verified Google login instead of the secret
          # (decision 0008). Omitted when the variable is unset, leaving only the
          # secret-gated path. Not a secret — it is just an allowlist of emails.
          if [ "${{ inputs.environment }}" = "staging" ] && [ -n "${{ vars.OPERATOR_ALLOWED_EMAILS }}" ]; then
            ENVVARS="$ENVVARS|OPERATOR_ALLOWED_EMAILS=${{ vars.OPERATOR_ALLOWED_EMAILS }}"
          fi
          # --region implies the fully managed platform, so --platform is omitted.
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --allow-unauthenticated \
            --service-account "${{ vars.CLOUD_RUN_RUNTIME_SA }}" \
            --set-env-vars "^|^$ENVVARS" \
            --set-secrets "$SECRETS"
          url="$(gcloud run services describe "${{ vars.CLOUD_RUN_SERVICE }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" --region "${{ vars.GCP_REGION }}" \
            --format='value(status.url)')"
          # Fail loudly rather than build a bundle pointed at an empty URL: an empty
          # value here would otherwise ship a green deploy whose frontend can't reach
          # the API (and our env.ts requires VITE_API_BASE_URL in production builds).
          if [ -z "$url" ]; then
            echo "::error::Cloud Run service URL was empty after deploy" >&2
            exit 1
          fi
          # Hand the live URL to the frontend build step (same job).
          echo "API_BASE_URL=$url" >> "$GITHUB_ENV"
          echo "Deployed API: $url"

      - name: Build web (Vite)
        # Vite inlines VITE_* at build time, so the API URL and the Firebase web
        # config must be present here (not at container runtime). VITE_API_BASE_URL
        # is the Cloud Run URL from the deploy step above; the Firebase web config is
        # public client config (it ships in the bundle) sourced from env-scoped
        # Actions variables. authDomain is the project's default Firebase domain
        # (<project>.firebaseapp.com). The build's output (frontend/dist) is the
        # Firebase Hosting public dir (firebase.json).
        env:
          VITE_API_BASE_URL: ${{ env.API_BASE_URL }}
          VITE_FIREBASE_API_KEY: ${{ vars.FIREBASE_WEB_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_PROJECT_ID }}.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          # Enable the dev switcher on staging only; production ships the neutral
          # placeholder (the operator surface it needs isn't mounted in prod).
          VITE_DEV_SWITCHER: ${{ inputs.environment == 'staging' && 'true' || '' }}
        run: |
          # Fail the deploy rather than ship a bundle that throws on first load: the
          # Firebase web API key is required for auth and is not derivable. (The API
          # URL is already guaranteed non-empty by the deploy step's check above.)
          if [ -z "$VITE_FIREBASE_API_KEY" ]; then
            echo "::error::FIREBASE_WEB_API_KEY variable is not set for ${{ inputs.environment }}" >&2
            exit 1
          fi
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Install Firebase CLI
        # Pinned (not "latest") so a future major can't change deploy behaviour silently.
        run: npm install -g firebase-tools@15.22.2

      - name: Deploy web to Firebase Hosting
        # firebase-tools cannot consume the Workload Identity Federation (external_account)
        # ADC that gcloud uses — its requireAuth only accepts a service-account key or a
        # refresh token. So Hosting deploys authenticate with a dedicated, hosting-only
        # service-account key (the FIREBASE_SA_KEY env-scoped secret) written to a temp
        # file. The Cloud Run steps above stay keyless on WIF; setting
        # GOOGLE_APPLICATION_CREDENTIALS only for this command leaves them untouched.
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
        run: |
          if [ -z "$FIREBASE_SA_KEY" ]; then
            echo "::error::FIREBASE_SA_KEY secret is not set for ${{ inputs.environment }}" >&2
            exit 1
          fi
          keyfile="$(mktemp)"
          trap 'rm -f "$keyfile"' EXIT
          printf '%s' "$FIREBASE_SA_KEY" > "$keyfile"
          GOOGLE_APPLICATION_CREDENTIALS="$keyfile" \
            firebase deploy --only hosting \
            --project "${{ vars.FIREBASE_PROJECT_ID }}" --non-interactive
