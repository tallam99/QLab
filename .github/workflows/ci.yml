# CI gate — runs on every PR and on pushes to main.
#
# This mirrors the local checks (`mage testUnit` + the Yaak secret scan) so a green
# PR means the same thing locally and in CI. Deploys live in separate workflows
# (deploy-backend.yml, deploy-frontend.yml) and only run after merge.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# One in-flight run per ref; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Build, vet, and the unit + secret-check suite — exactly `mage testUnit`, plus a
  # full build/vet so a compile error in non-test code is caught too.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Python backs the Yaak secret-check tests that `mage testUnit` runs.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install mage
        run: go install github.com/magefile/mage@v1.17.2

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./backend/...

      - name: Unit tests (+ Yaak secret-check tests)
        run: mage testUnit

  # Guard against real credentials landing in the committed Yaak workspace. The
  # same script runs in the lefthook pre-commit hook locally.
  yaak-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Scan committed Yaak workspace for secrets
        run: python3 scripts/check-yaak-secrets.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pinned to the version validated locally; bump deliberately.
          version: v2.12.2
