# CI gate — runs on every PR, and as the first job inside deploy.yml on pushes to
# main (via workflow_call), so a deploy can only proceed once these checks pass.
#
# Each job mirrors a `mage` test target so a green PR means the same thing locally
# and in CI (`mage test` = testUnit + testSecurity + testSchema + testIntegration;
# the schema and integration tiers need a database, so each runs as its own job
# with a Postgres service).
name: CI

on:
  pull_request:
  # Called by deploy.yml as its gating job on push to main. We do NOT also trigger
  # on `push: branches: [main]` directly: that would run CI twice per merge (once
  # standalone, once via deploy) and waste free-tier minutes. Routing main through
  # deploy.yml keeps a single CI run that gates the deploy on the same commit.
  workflow_call:

# One in-flight run per ref; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Build, vet, and the Go unit suite — `mage testUnit`, plus a full build/vet so a
  # compile error in non-test code is caught too.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install mage
        run: go install github.com/magefile/mage@v1.17.2

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./backend/...

      - name: Unit tests
        run: mage testUnit

  # Security checks — `mage testSecurity`: the Yaak secret-scanner's tests and the
  # scanner itself against the committed workspace (the same scan the lefthook
  # pre-commit hook runs). Go is set up because mage compiles the magefile.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install mage
        run: go install github.com/magefile/mage@v1.17.2
      - name: Security tests
        run: mage testSecurity

  # DB schema tests — `mage testSchema`. A Postgres service stands in for the local
  # Compose stack; its credentials match .env.example.json (qlab/qlab/qlab:5432) so
  # `mage` derives the same connection string it uses locally. TestMain creates,
  # migrates, seeds, and drops a throwaway database. This job also gates CD, since
  # deploy.yml runs this workflow before any deploy.
  schema:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: qlab
          POSTGRES_PASSWORD: qlab
          POSTGRES_DB: qlab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qlab -d qlab"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install mage
        run: go install github.com/magefile/mage@v1.17.2
      - name: Schema tests
        run: mage testSchema

  # Full-stack integration tests — `mage testIntegration`. Like the schema job, a
  # Postgres service stands in for the local Compose stack; the suite's TestMain
  # boots the real server (as a non-privileged RLS-bound app role it creates) and
  # drives it through the generated Connect client, then drops its throwaway database.
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: qlab
          POSTGRES_PASSWORD: qlab
          POSTGRES_DB: qlab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qlab -d qlab"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install mage
        run: go install github.com/magefile/mage@v1.17.2
      - name: Integration tests
        run: mage testIntegration

  # Proto contract checks: lint the schema, guard against backwards-incompatible
  # changes once it exists on main, and prove the committed generated code matches
  # the .proto (we commit codegen rather than generating in the consumer builds, so
  # CI is what keeps it honest). Mirrors `mage genProto`.
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install mage
        run: go install github.com/magefile/mage@v1.17.2
      - uses: bufbuild/buf-setup-action@v1
        with:
          # Pinned to the version validated locally; bump deliberately.
          version: 1.71.0
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: buf lint
        run: buf lint proto
      - name: buf breaking against main
        # buf breaking needs a baseline; proto/ has no module on main until this
        # lands, so only run the check once it's there (first merge seeds it).
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/proto/buf.yaml?ref=main")
          if [ "$status" = "200" ]; then
            buf breaking proto --against "https://github.com/${{ github.repository }}.git#branch=main,subdir=proto"
          else
            echo "proto/buf.yaml not on main yet (HTTP $status); breaking check begins after this merges"
          fi
      - name: Install TS codegen plugin
        run: npm --prefix proto ci
      - name: Verify generated code is up to date
        # Regenerate and fail if the committed output drifts from the .proto.
        # --porcelain catches added/removed files too, not just modifications.
        run: |
          mage genProto
          changes=$(git status --porcelain -- backend/internal/protogen frontend/src/protogen)
          if [ -n "$changes" ]; then
            echo "$changes"
            echo "::error::generated code is stale — run 'mage genProto' and commit"
            exit 1
          fi

  # sqlc codegen check: prove the committed store query code matches queries.sql +
  # the migration schema (committed, like proto, so consumer builds need no sqlc).
  # Mirrors `mage genSqlc`.
  sqlc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install mage
        run: go install github.com/magefile/mage@v1.17.2
      - name: Verify generated code is up to date
        run: |
          mage genSqlc
          changes=$(git status --porcelain -- backend/internal/store/pgstore/sqlcgen)
          if [ -n "$changes" ]; then
            echo "$changes"
            echo "::error::generated code is stale — run 'mage genSqlc' and commit"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        # v7+ is required for golangci-lint v2 (the config schema this repo uses).
        uses: golangci/golangci-lint-action@v7
        with:
          # Pinned to the version validated locally; bump deliberately.
          version: v2.12.2

  # Mutation-test the scheduling engine (`mage mutate`), which gates on mutant
  # coverage — every reachable mutant must be exercised by a test (see
  # .gremlins.yaml). Soft for now (continue-on-error) while we build confidence in
  # its stability on CI runners; tighten to a required check later. It mutates the
  # whole engine, which is fast today; switch to gremlins' `--diff` mode if it ever
  # grows slow.
  mutation:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install mage
        run: go install github.com/magefile/mage@v1.17.2
      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0
      - name: Mutation test the engine
        run: mage mutate
