<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QLab</title>
    <style>
      /* Branding (docs/PLAN.md Phase 10): dark bg, teal accent, monospace data. */
      :root {
        --bg: #0f1117;
        --teal: #00c9a7;
        --red: #f87171;
        --fg: #e6e8ee;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, sans-serif;
      }
      h1 { color: var(--teal); margin: 0; }
      p { margin: 0; opacity: 0.8; }
      #status {
        font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
        font-size: 0.9rem;
        padding: 0.5rem 0.75rem;
        border: 1px solid #2a2e3a;
        border-radius: 6px;
      }
      #status.ok { color: var(--teal); border-color: var(--teal); }
      #status.err { color: var(--red); border-color: var(--red); }
    </style>
  </head>
  <body>
    <h1>QLab</h1>
    <p>Hello world — Phase 3 deploy check.</p>
    <div id="status">checking API…</div>

    <script>
      // The API base URL is injected at build time per environment (see
      // frontend/build.sh). This page calls the API cross-origin on purpose: a
      // successful fetch proves CORS is configured between Hosting and Cloud Run.
      // The real Vite/React PWA replaces this placeholder in Phase 9.
      const apiBase = "__API_BASE_URL__";
      const el = document.getElementById("status");
      if (!apiBase) {
        el.textContent = "API base URL not configured at build time";
        el.className = "err";
      } else {
        fetch(apiBase.replace(/\/$/, "") + "/healthq")
          .then((r) => r.json())
          .then((d) => {
            el.textContent = "API /healthq → " + JSON.stringify(d);
            el.className = "ok";
          })
          .catch((e) => {
            el.textContent = "API unreachable (CORS or down): " + e;
            el.className = "err";
          });
      }
    </script>
  </body>
</html>
